<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f0e">
  <title>Canine360 – Kursdeltagare</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Laddar -->
  <div id="view-loading" class="view center">
    <img src="icon-192.png" alt="" class="logo">
    <p class="muted">Laddar…</p>
  </div>

  <!-- Inloggning -->
  <div id="view-auth" class="view hidden">
    <div class="auth-box">
      <img src="icon-192.png" alt="Canine360" class="logo">
      <h1>Canine360</h1>
      <p class="muted">För kursdeltagare — funkar på alla mobiler.<br>
        Har du iPhone? Använd gärna appen i stället.</p>

      <div class="card">
        <label>E-post
          <input type="email" id="auth-email" autocomplete="email" placeholder="din@epost.se">
        </label>
        <label>Lösenord
          <input type="password" id="auth-password" autocomplete="current-password" placeholder="Minst 6 tecken">
        </label>
        <label id="auth-name-row" class="hidden">Ditt namn
          <input type="text" id="auth-name" autocomplete="name" placeholder="t.ex. Anna Andersson">
        </label>
        <p id="auth-error" class="error hidden"></p>
        <button id="auth-submit" class="btn primary">Logga in</button>
        <button id="auth-toggle" class="btn link">Ny här? Skapa konto</button>
      </div>
    </div>
  </div>

  <!-- Mina team -->
  <div id="view-teams" class="view hidden">
    <header>
      <img src="icon-192.png" alt="" class="logo small">
      <h2>Mina team</h2>
      <button id="btn-signout" class="btn link">Logga ut</button>
    </header>

    <div class="card">
      <label>Gå med med kod
        <div class="row">
          <input type="text" id="join-code" placeholder="t.ex. ABCD-EFGH" autocapitalize="characters" autocomplete="off">
          <button id="btn-join" class="btn primary">Gå med</button>
        </div>
      </label>
      <p class="muted small-text">Koden får du av din hundinstruktör.</p>
      <p id="join-error" class="error hidden"></p>
    </div>

    <div id="teams-list"></div>
    <p id="teams-empty" class="muted center-text hidden">Du är inte med i något team än — ange koden från din instruktör ovan.</p>
  </div>

  <!-- Teamsida -->
  <div id="view-team" class="view hidden">
    <header>
      <button id="btn-back" class="btn link">‹ Team</button>
      <h2 id="team-title"></h2>
      <span></span>
    </header>

    <nav class="tabs">
      <button data-tab="posts" class="tab active">Inlägg</button>
      <button data-tab="tasks" class="tab">Uppgifter</button>
      <button data-tab="meetups" class="tab">Träffar</button>
      <button data-tab="members" class="tab">Medlemmar</button>
    </nav>

    <div id="tab-posts" class="tab-content"></div>
    <div id="tab-tasks" class="tab-content hidden"></div>
    <div id="tab-meetups" class="tab-content hidden"></div>
    <div id="tab-members" class="tab-content hidden"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
